<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DRIFT</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HUD: score / best / level / lives shown above the canvas ── -->
  <div id="hud">
    SCORE <span id="sc">000000</span> &nbsp;
    BEST  <span id="bs">000000</span> &nbsp;
    LEVEL <span id="lv" style="color:#ff9a3c">01</span> &nbsp;
    HULL  <span id="hp">❤❤❤</span>
  </div>

  <!-- ── Game area: canvas sits inside a wrapper so the overlay can cover it ── -->
  <div id="wrap">
    <canvas id="c" width="480" height="520"></canvas>

    <!-- Start / game-over screen shown on top of the canvas -->
    <div id="overlay">
      <h2>DRIFT</h2>
      <p>ASTEROID FIELD SURVIVAL</p>
      <p id="result" style="color:#c8e6f0"></p>
      <button id="btn">LAUNCH</button>
      <p>← → or A D to move</p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
